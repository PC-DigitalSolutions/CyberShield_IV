<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield AI - El Guardiįn | Command Center</title>
    <style>
        body { background-color: #030914; color: #c9d1d9; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { border-bottom: 2px solid #1f293d; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #58a6ff; margin: 0; font-size: 26px; font-weight: 700; letter-spacing: 1px; }
        .status-badge { background-color: #238636; color: white; padding: 6px 16px; border-radius: 4px; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #2ea043; }
        .card { background-color: #0b1528; border: 1px solid #1f293d; border-radius: 8px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 24px; }
        h3 { color: #f0f6fc; margin-top: 0; border-bottom: 1px solid #1f293d; padding-bottom: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        textarea { width: 100%; height: 120px; background-color: #030914; border: 1px solid #1f293d; border-radius: 6px; color: #f0f6fc; padding: 15px; font-size: 15px; box-sizing: border-box; resize: none; margin-bottom: 15px; }
        textarea:focus { border-color: #58a6ff; outline: none; }
        .btn-group { display: flex; gap: 12px; }
        .btn { background-color: #1f293d; color: #c9d1d9; border: 1px solid #30363d; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; font-size: 14px; }
        .btn:hover { background-color: #30363d; border-color: #8b949e; color: #f0f6fc; }
        .btn-primary { background-color: #238636; border-color: #2ea043; color: white; }
        .btn-primary:hover { background-color: #2ea043; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        pre { background-color: #030914; padding: 18px; border-radius: 6px; border: 1px solid #1f293d; overflow-x: auto; color: #7ee787; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; min-height: 200px; margin: 0; }
        .meta-strip { background-color: #070f1e; border: 1px solid #1f293d; padding: 10px 20px; border-radius: 6px; margin-bottom: 24px; font-size: 13px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>EL GUARDIĮN</h1>
                <small style="color: #8b949e; font-weight: 600;">CyberShield AI • Command Center</small>
            </div>
            <div class="status-badge" id="top-badge">BACKEND ONLINE</div>
        </header>

        <div class="card">
            <h3>Command Input</h3>
            <textarea id="signal-input" placeholder="Paste suspicious message, deepfake description, scam link, compliance issue, traffic spike, or threat signal..."></textarea>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="processSignal('/analyze')">ANALYZE</button>
                <button class="btn" onclick="processSignal('/route')">ROUTE ONLY</button>
                <button class="btn" onclick="processSignal('/utr')">EMERGENCY SCAN</button>
                <button class="btn" onclick="document.getElementById('signal-input').value='';">CLEAR</button>
            </div>
        </div>

        <div class="meta-strip" id="meta-data">
            MITRE: — | Lead: — | Gate: —
        </div>

        <div class="grid">
            <div class="card">
                <h3>Guardian Thinking</h3>
                <pre id="thinking">// Awaiting command signal...</pre>
            </div>
            <div class="card">
                <h3>Guardian Response</h3>
                <pre id="response">// Submit a signal to activate ElGuardianCNS.</pre>
            </div>
        </div>
    </div>

    <script>
        async function processSignal(endpoint) {
            const input = document.getElementById('signal-input').value.trim();
            const thinkingBox = document.getElementById('thinking');
            const responseBox = document.getElementById('response');
            const metaStrip = document.getElementById('meta-data');

            if (!input) {
                alert('Please input a signal or message string to analyze.');
                return;
            }

            thinkingBox.textContent = 'Routing signal matrix across centralized nervous system gates...';
            responseBox.textContent = 'Processing...';

            try {
                const response = await fetch(endpoint + '?signal=' + encodeURIComponent(input));
                const data = await response.json();

                thinkingBox.textContent = JSON.stringify(data, null, 4);

                if (data.status === 'routed') {
                    responseBox.textContent = JSON.stringify(data.utr || data, null, 4);
                    metaStrip.innerHTML = `<strong>MITRE:</strong> ${data.utr?.mitre_attack_id || 'N/A'} | <strong>Lead:</strong> ${data.primary_agent} | <strong>Gate:</strong> ${data.primary_gate}`;
                } else {
                    responseBox.textContent = JSON.stringify(data, null, 4);
                    metaStrip.textContent = 'Signal processed - No core threats triggered.';
                }
            } catch (error) {
                thinkingBox.textContent = 'CRITICAL LOGICAL ERROR';
                responseBox.textContent = 'Could not communicate with the processing server: ' + error;
            }
        }
    </script>
</body>
</html>
